{% extends 'dashboard/student/dashboard.html' %}
{% load static %}
{% block title %}Seishin Dojo JKA |  Profile{% endblock %}
{% block css %}
  <!-- Tempusdominus Bootstrap 4 (Datepicker) -->
  <link rel="stylesheet" href="{% static 'plugins/tempusdominus-bootstrap-4/css/tempusdominus-bootstrap-4.min.css' %}">
  <!-- Country picker flags -->
  <link rel="stylesheet" href="{% static 'plugins/bootstrap-select-country-4.2.0/css/bootstrap-select-country.min.css' %}">
  <!-- Cropper.js -->
  <link href="{% static 'plugins/cropperjs-v1.6.2/css/cropper.min.css' %}" rel="stylesheet">
{% endblock %}
{% block content %}
  <div class="content-header">
    <div class="container py-3">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1 class="mb-2 text-bold">Profile</h1>
        </div><!-- /.col -->
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item">
              <a href="
              {% if user.is_authenticated %}
                {% if user.is_staff %}
                  {% url 'sensei_dashboard' %}
                {% else %}
                  {% url 'student_dashboard' %}
                {% endif %}
              {% else %}
                {% url 'landing' %}
              {% endif %}">Home</a>
            </li>
            <li class="breadcrumb-item active">Profile</li>
          </ol>
        </div><!-- /.col -->
      </div><!-- /.row -->
    </div><!-- /.container-fluid -->
  </div>
  <div class="content">
    <div class="container">
      {% include 'dashboard/common/profile.html' %}
    </div>
  </div>
{% endblock %}
{% block js %}
  <!-- Tempusdominus Bootstrap 4 -->
  <script src="{% static 'plugins/moment/moment.min.js' %}"></script>
  <!-- For datepicker -->
  <script src="{% static 'plugins/tempusdominus-bootstrap-4/js/tempusdominus-bootstrap-4.min.js' %}"></script>
  <!-- Country picker flags -->
  <script src="{% static 'plugins/bootstrap-select-country-4.2.0/js/bootstrap-select-country.min.js' %}"></script>
  <!-- Cropper.js -->
  <script src="{% static 'plugins/cropperjs-v1.6.2/js/cropper.min.js' %}" rel="stylesheet"></script>
  <!-- Custom JS for modal and crop -->
  <script src="{% static 'dist/js/custom.js' %}" rel="stylesheet"></script>
  <script>
      $(document).ready(function () {
          $('#id_birth_date').datetimepicker({
              format: 'L',
              //locale: 'es'
          });
          $('#id_date_joined').datetimepicker({
              format: 'L',
              //locale: 'es'
          });

          $('.countrypicker').countrypicker();

          // Custom file input - show selected file names
          $('.custom-file-input').on('change', function() {
              let files = $(this)[0].files;
              let fileNames = [];
              for (let i = 0; i < files.length; i++) {
                  fileNames.push(files[i].name);
              }
              let label = fileNames.length > 0 ? fileNames.join(', ') : 'Choose files...';
              $(this).next('.custom-file-label').html(label);
          });
      });

      // Delete document function
      function deleteDocument(docId) {
          if (confirm('Are you sure you want to delete this document? This action cannot be undone.')) {
              // Create a form and submit it
              let form = document.createElement('form');
              form.method = 'POST';
              form.action = window.location.pathname;

              // Add CSRF token
              let csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
              let csrfInput = document.createElement('input');
              csrfInput.type = 'hidden';
              csrfInput.name = 'csrfmiddlewaretoken';
              csrfInput.value = csrfToken;
              form.appendChild(csrfInput);

              // Add action
              let actionInput = document.createElement('input');
              actionInput.type = 'hidden';
              actionInput.name = 'action';
              actionInput.value = 'delete_doc';
              form.appendChild(actionInput);

              // Add doc_id
              let docIdInput = document.createElement('input');
              docIdInput.type = 'hidden';
              docIdInput.name = 'doc_id';
              docIdInput.value = docId;
              form.appendChild(docIdInput);

              document.body.appendChild(form);
              form.submit();
          }
      }
  </script>
{% endblock %}
