{% extends 'base-user.html' %}
{% load static %}

{% block css %}
<!-- fullCalendar -->
<link rel="stylesheet" href="{% static 'plugins/fullcalendar/main.css' %}">
<style>
  .calendar-container {
    margin-top: 20px;
  }
  .content-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 40px 0;
    margin-bottom: 30px;
  }
  .content-header h1 {
    color: white;
    font-weight: bold;
  }
</style>
{% endblock %}

{% block content %}
<!-- Content Header -->
<section class="content-header">
  <div class="container">
    <div class="row">
      <div class="col-12 text-center">
        <h1>Training Calendar</h1>
        <p class="lead">View all upcoming training sessions</p>
      </div>
    </div>
  </div>
</section>

<!-- Main content -->
<section class="content calendar-container">
  <div class="container">
    <div class="row">
      <div class="col-md-3 mb-4">
        <div class="card">
          <div class="card-header bg-danger text-white">
            <h4 class="card-title mb-0">Legend</h4>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <span class="badge" style="background-color: #ffc800; padding: 5px 10px;"><i class="fas fa-hourglass-half"></i></span>
              <span class="ml-2">Upcoming training</span>
            </div>
            <div class="mb-3">
              <span class="badge" style="background-color: #3c8dbc; padding: 5px 10px;"><i class="fas fa-sync-alt"></i></span>
              <span class="ml-2">On going</span>
            </div>
            <div class="mb-3">
              <span class="badge" style="background-color: #00a65a; padding: 5px 10px;"><i class="fas fa-check-circle"></i></span>
              <span class="ml-2">Completed</span>
            </div>
            <div class="mb-3">
              <span class="badge" style="background-color: #dd4b39; padding: 5px 10px;"><i class="fas fa-ban"></i></span>
              <span class="ml-2">Cancelled</span>
            </div>
          </div>
        </div>

        <div class="card mt-3">
          <div class="card-header bg-info text-white">
            <h4 class="card-title mb-0">Quick Links</h4>
          </div>
          <div class="card-body">
            <a href="{% url 'student_dashboard' %}" class="btn btn-outline-primary btn-block mb-2">
              <i class="fas fa-home mr-1"></i> Dashboard
            </a>
            <a href="{% url 'library' %}" class="btn btn-outline-info btn-block">
              <i class="fas fa-book mr-1"></i> Library
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-9">
        <div class="card">
          <div class="card-body p-3">
            <!-- THE CALENDAR -->
            <div id="calendar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block js %}
<!-- fullCalendar -->
<script src="{% static 'plugins/moment/moment.min.js' %}"></script>
<script src="{% static 'plugins/fullcalendar/main.js' %}"></script>
<!-- Page specific script -->
<script>
  $(function () {
    /* initialize the calendar
     -----------------------------------------------------------------*/
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      headerToolbar: {
        left  : 'prev,next today',
        center: 'title',
        right : 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      themeSystem: 'bootstrap',
      initialView: 'dayGridMonth',
      editable: false,
      droppable: false,
      events: {
        url: '{% url "api_trainings" %}',
        failure: function() {
          alert('There was an error while fetching training events!');
        }
      },
      eventContent: function(arg) {
        var iconMap = {
          'S': 'fas fa-hourglass-half',
          'O': 'fas fa-sync-alt',
          'F': 'fas fa-check-circle',
          'C': 'fas fa-ban'
        };
        var icon = iconMap[arg.event.extendedProps.status] || 'fas fa-circle';
        var title = arg.event.title ? ' ' + arg.event.title : '';
        return { html: '<i class="' + icon + '" style="color: black;"></i>' + title };
      },
      eventDidMount: function(info) {
        var colorMap = {
          'S': '#ffc800',
          'O': '#3c8dbc',
          'F': '#00a65a',
          'C': '#dd4b39'
        };
        var color = colorMap[info.event.extendedProps.status] || '#3c8dbc';
        info.el.style.backgroundColor = color;
        info.el.style.borderColor = color;
        // Add tooltip with description
        if (info.event.extendedProps.description) {
          $(info.el).tooltip({
            title: info.event.extendedProps.description,
            placement: 'top',
            trigger: 'hover',
            container: 'body'
          });
        }
      },
      eventClick: function(info) {
        // Prevent default navigation for students
        info.jsEvent.preventDefault();

        // Show event details in alert or modal
        var details = 'Training Details:\n\n';
        details += info.event.title + '\n';
        details += 'Date: ' + info.event.start.toLocaleString() + '\n';
        if (info.event.extendedProps.description) {
          details += '\n' + info.event.extendedProps.description;
        }
        alert(details);
      },
      loading: function(isLoading) {
        if (isLoading) {
          console.log('Loading events...');
        } else {
          console.log('Events loaded');
        }
      }
    });

    calendar.render();
  });
</script>
{% endblock %}
