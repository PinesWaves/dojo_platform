{% load static %}
<!-- Modal: Add new training scheduling -->
<div class="modal fade" id="modal-new-schedule" tabindex="-1" aria-labelledby="modalNewScheduleLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-secondary">
      <form id="form-new-schedule" method="POST" enctype="multipart/form-data" action="{% url 'manage_trainings' %}">
        <input type="hidden" name="action" value="schedule">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="modalNewScheduleLabel">Add new scheduling</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body text-center">
          {% for field in scheduling_form %}
            <div class="form-group row">
              <label for="{{ field.id_for_label }}" class="col-sm-3 col-form-label">{{ field.label }}</label>
              <div class="col-sm-8">
                {{ field }}
                {% if field.errors %}
                  <span class="text-danger">{{ field.errors }}</span>
                {% endif %}
              </div>
            </div>
          {% endfor %}
        </div>
        <div class="modal-footer justify-content-between">
          <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-danger">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>
