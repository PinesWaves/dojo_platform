{% load static %}
<!-- QR Scanner Modal -->
<div class="modal fade" id="qrScannerModal" tabindex="-1" role="dialog" aria-labelledby="qrScannerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="qrScannerModalLabel">
          <i class="fas fa-qrcode mr-2"></i>QR Attendance Scanner
        </h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div id="qr-reader-view" style="width: 100%;"></div>
        <div id="qr-scan-result" class="mt-3"></div>
      </div>
      <div class="modal-footer">
        <small class="text-muted">Point the camera at a student's QR code to register attendance.</small>
      </div>
    </div>
  </div>
</div>
