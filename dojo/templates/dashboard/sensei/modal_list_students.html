{% load static %}
<div class="modal fade" id="modal-list-students-{{ t.id }}" tabindex="-1" aria-labelledby="modalListTechniquesLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Attendance list</h4>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body text-center">
        <label for="modal-student-list-{{ t.id }}">Students:</label>
        <div id="modal-student-list-{{ t.id }}">
          {% for at in t.attendances.all|dictsort:"student.last_name" %}
            {% if at.status == "P" %}
              {{ at.student.last_name }} {{ at.student.first_name }}<br>
            {% endif %}
          {% empty %}
          No students attended
          {% endfor %}
        </div>
      </div>
      <div class="modal-footer justify-content-between">
        <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
      </div>
    </div>
    <!-- /.modal-content -->
  </div>
  <!-- /.modal-dialog -->
</div>
<!-- /.modal -->
