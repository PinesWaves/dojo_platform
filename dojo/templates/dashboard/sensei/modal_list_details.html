{% load static %}
<!-- Modal: Add new training scheduling -->
<div class="modal fade" id="modal-list-details-{{ t.id }}" tabindex="-1" aria-labelledby="modalListTechniquesLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Technique list</h4>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body text-center">
      {% for tc in t.techniques.all %}
        {{ tc.name }}<br>
      {% empty %}
        No lessons assigned
      {% endfor %}
      </div>
      <div class="modal-footer justify-content-between">
        <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
      </div>
    </div>
    <!-- /.modal-content -->
  </div>
  <!-- /.modal-dialog -->
</div>
<!-- /.modal -->
