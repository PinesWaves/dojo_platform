      - title: "El Kiai: Qué es y cómo aplicarlo"
        description: "El Kiai es una expresión vocal que acompaña a un movimiento decisivo en la kata. Su propósito es
        concentrar la energía, intimidar al oponente y fortalecer la técnica. En Heian Shodan, el Kiai se realiza en los
        movimientos 9 y 17, coincidiendo con técnicas de ataque importantes. Para aplicarlo correctamente, se debe
        exhalar con fuerza y proyectar la voz desde el abdomen, manteniendo una postura firme y enfocada."
        order: 5
        images: null
        videos:
          - description: "¿Qué es el Kiai? El Poderoso Grito que Transforma tu Técnica | Aprende a Dominar el Kiai"
            url: "https://www.youtube.com/watch?v=iTLu3wwyf6k"

  - title: "Unidad 5: Refinamiento, Aplicación (Bunkai) y Evaluación"
    kata: Heian Shodan (平安初段)
    order: b1.5
    objectives:
      - Refinar la ejecución de Heian Shodan, prestando atención a los detalles y la fluidez.
      - Comprender y visualizar posibles aplicaciones (Bunkai) de los movimientos de la kata.
      - Realizar una autoevaluación y planificar la mejora continua.
    content:
      - Práctica avanzada de Heian Shodan, enfocándose en la precisión y el ritmo.
      - Introducción al Bunkai: análisis y demostración de aplicaciones prácticas.
      - Técnicas de autoevaluación y establecimiento de metas para el progreso futuro.
