services:
  kapp_db_local:
    restart: always
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DOJO_DB_NAME}
      POSTGRES_USER: ${DOJO_DB_USER}
      POSTGRES_PASSWORD: ${DOJO_DB_PASS}
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    env_file:
      - .env_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOJO_DB_USER} -d ${DOJO_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  kapp_web_local:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.local
    working_dir: /app/dojo
    tty: true
    stdin_open: true
    volumes:
      - .:/app
      - ./dojo/static/:/app/dojo/static/
      - ./dojo/media/:/app/dojo/media/
      - ./dojo/logs:/app/dojo/logs
    ports:
      - "8001:8000"
    env_file:
      - .env_local
    depends_on:
      kapp_db_local:
        condition: service_healthy
volumes:
  pgdata_local:
